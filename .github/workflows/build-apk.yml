name: Build Android APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias stock \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass StockDash2024 -keypass StockDash2024 \
            -dname "CN=StockDash,OU=App,O=absureshbabu,L=IN,ST=IN,C=IN"
          echo "✅ Keystore ready"

      - name: Create TWA Android project
        run: |
          python3 << 'PYEOF'
          import os

          HOST     = "stock-dashboard-p-haugxzet3zxoc4oehcrtdd.streamlit.app"
          APP_URL  = f"https://{HOST}"
          APP_ID   = "com.absureshbabu.stockdashboard"
          APP_NAME = "Stock Dashboard"
          COLOR    = "#1a73e8"

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w').write(content)

          # ── Gradle wrapper properties ───────────────────────────────────────
          w('twa/gradle/wrapper/gradle-wrapper.properties',
          'distributionBase=GRADLE_USER_HOME\n'
          'distributionPath=wrapper/dists\n'
          'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n'
          'zipStoreBase=GRADLE_USER_HOME\n'
          'zipStorePath=wrapper/dists\n')

          # ── settings.gradle ─────────────────────────────────────────────────
          w('twa/settings.gradle', "include ':app'\n")

          # ── Root build.gradle ────────────────────────────────────────────────
          w('twa/build.gradle', """\
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          """)

          # ── gradle.properties ────────────────────────────────────────────────
          w('twa/gradle.properties',
          'android.useAndroidX=true\nandroid.enableJetifier=true\n')

          # ── app/build.gradle ─────────────────────────────────────────────────
          w('twa/app/build.gradle', f"""\
          plugins {{ id 'com.android.application' }}

          android {{
              namespace '{APP_ID}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{APP_ID}'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
                  manifestPlaceholders = [
                      hostName: '{HOST}',
                      defaultUrl: '{APP_URL}',
                      launcherName: '{APP_NAME}'
                  ]
              }}
              signingConfigs {{
                  release {{
                      storeFile file('../../keystore.jks')
                      storePassword 'StockDash2024'
                      keyAlias 'stock'
                      keyPassword 'StockDash2024'
                  }}
              }}
              buildTypes {{
                  debug   {{ signingConfig signingConfigs.release }}
                  release {{ signingConfig signingConfigs.release; minifyEnabled false }}
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }}
          }}

          dependencies {{
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }}
          """)

          # ── AndroidManifest.xml ──────────────────────────────────────────────
          w('twa/app/src/main/AndroidManifest.xml', """\
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="${launcherName}" android:theme="@style/AppTheme"
                         android:supportsRtl="true">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                        android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                           android:value="${defaultUrl}"/>
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                           android:resource="@color/colorPrimary"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="${hostName}"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          """)

          # ── res/values/strings.xml ───────────────────────────────────────────
          w('twa/app/src/main/res/values/strings.xml',
          f'<?xml version="1.0" encoding="utf-8"?>\n'
          f'<resources><string name="app_name">{APP_NAME}</string></resources>\n')

          # ── res/values/colors.xml ────────────────────────────────────────────
          w('twa/app/src/main/res/values/colors.xml',
          f'<?xml version="1.0" encoding="utf-8"?>\n'
          f'<resources><color name="colorPrimary">{COLOR}</color></resources>\n')

          # ── res/values/styles.xml ────────────────────────────────────────────
          w('twa/app/src/main/res/values/styles.xml', """\
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
            </style>
          </resources>
          """)

          import subprocess
          print("✅ Project files created:")
          print(subprocess.check_output(['find','twa','-type','f']).decode())
          PYEOF

      - name: Download Gradle wrapper jar
        run: |
          # Download gradle-wrapper.jar (needed to run gradlew)
          mkdir -p twa/gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/GoogleChrome/android-browser-helper/main/demos/twa-basic/gradle/wrapper/gradle-wrapper.jar" \
            -o twa/gradle/wrapper/gradle-wrapper.jar

          # Create gradlew script
          curl -sL "https://raw.githubusercontent.com/GoogleChrome/android-browser-helper/main/demos/twa-basic/gradlew" \
            -o twa/gradlew
          chmod +x twa/gradlew
          echo "✅ Gradle wrapper ready"

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          echo "Licenses accepted (or sdkmanager not found, continuing anyway)"

      - name: Build APK
        working-directory: twa
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80

      - name: Find APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-dashboard-apk
          path: '**/*.apk'
          if-no-files-found: error
