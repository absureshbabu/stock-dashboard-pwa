<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#0d1b2a"/>

  <!-- Grid lines -->
  <line x1="64" y1="384" x2="448" y2="384" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="64" y1="288" x2="448" y2="288" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="64" y1="192" x2="448" y2="192" stroke="#1a3a5c" stroke-width="2"/>

  <!-- Main price line (blue) -->
  <polyline
    points="64,340 148,290 212,310 296,220 368,180 448,140"
    stroke="#1a73e8" stroke-width="18"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area fill under line -->
  <polygon
    points="64,340 148,290 212,310 296,220 368,180 448,140 448,384 64,384"
    fill="#1a73e8" fill-opacity="0.12"/>

  <!-- Green upward arrow segment -->
  <polyline
    points="296,220 368,180 448,140"
    stroke="#00c853" stroke-width="18"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots at key points -->
  <circle cx="296" cy="220" r="12" fill="#1a73e8"/>
  <circle cx="448" cy="140" r="14" fill="#00c853"/>

  <!-- Rupee symbol -->
  <text x="80" y="478" font-family="Arial, sans-serif" font-size="64"
        font-weight="700" fill="#93b4d0" opacity="0.6">₹</text>
</svg>
